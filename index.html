<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>⚡ 3awd9ass — Live Blackout Map</title>

    <!-- Preload critical font (Inter) as WOFF2 -->
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v12/UcC73FwrK3iLTeHuS_fvQtMwCp50KnMa2JL7W0Q5n-wU.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />

    <!-- Leaflet CSS + JS with defer -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

    <!-- Perf: warm up connections -->
    <link rel="preconnect" href="https://a.tile.openstreetmap.org" />
    <link rel="preconnect" href="https://b.tile.openstreetmap.org" />
    <link rel="preconnect" href="https://c.tile.openstreetmap.org" />
    <link rel="preconnect" href="https://njfulpklvqezflxiozhn.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

    <style>
        /* ----- RESET & BASE ----- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6C63FF;
            --primary-dark: #5a52d6;
            --primary-light: #8a83ff;
            --primary-glow: rgba(108, 99, 255, 0.3);
            --danger: #FF6B6B;
            --danger-dark: #e55a5a;
            --success: #4CAF50;
            --success-dark: #388E3C;
            --warning: #FFC107;
            --warning-dark: #e6a800;
            --bg: #f0f2f8;
            --bg-glass: rgba(255, 255, 255, 0.72);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8888aa;
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 40px rgba(0, 0, 0, 0.10);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.15);
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 28px;
            --radius-full: 9999px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --header-height: 60px;
            --sheet-handle-height: 44px;
            --blur-strength: 18px;
        }

        /* Mobile-first smaller blur for GPU */
        @media (max-width: 600px) {
            :root {
                --blur-strength: 10px;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            :root {
                --blur-strength: 6px;
            }
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ----- SCROLLBAR ----- */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 20px;
        }

        /* ----- APP SHELL ----- */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ----- HEADER ----- */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--bg-glass);
            backdrop-filter: blur(var(--blur-strength)) saturate(1.3);
            -webkit-backdrop-filter: blur(var(--blur-strength)) saturate(1.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 20;
            flex-shrink: 0;
            min-height: var(--header-height);
            will-change: transform;
            contain: layout style paint;
        }
        .app-header .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.3px;
        }
        .app-header .brand .icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1rem;
            box-shadow: 0 4px 12px var(--primary-glow);
            flex-shrink: 0;
        }
        .app-header .brand .icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
        .app-header .brand span {
            background: linear-gradient(135deg, var(--text-primary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .header-actions button {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            color: var(--text-secondary);
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            will-change: transform;
            contain: layout style paint;
        }
        .header-actions button:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.05);
        }
        .header-actions button:active {
            transform: scale(0.92);
        }
        .header-actions button svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
        .header-actions .badge-dot {
            position: relative;
        }
        .header-actions .badge-dot::after {
            content: '';
            position: absolute;
            top: 5px;
            right: 5px;
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            border: 2px solid #fff;
            animation: pulse-dot 2s infinite;
            will-change: transform, opacity;
            contain: strict;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }
        }

        /* ----- MAP CONTAINER ----- */
        .map-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 0;
            contain: layout style paint;
        }
        #map {
            width: 100%;
            height: 100%;
            background: #dde2ed;
        }

        /* ----- POPUP LAYERING ----- */
        .leaflet-popup {
            z-index: 1000 !important;
        }
        .leaflet-popup-content-wrapper {
            z-index: 1001 !important;
            border-radius: var(--radius-sm) !important;
            box-shadow: var(--shadow-md) !important;
            padding: 0 !important;
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .leaflet-popup-content {
            margin: 12px 16px !important;
            font-family: 'Inter', sans-serif;
            min-width: 180px;
        }
        .leaflet-popup-tip {
            background: rgba(255, 255, 255, 0.95) !important;
        }

        .leaflet-control-zoom {
            border: none !important;
            box-shadow: var(--shadow-sm) !important;
            border-radius: var(--radius-sm) !important;
            overflow: hidden;
        }
        .leaflet-control-zoom a {
            background: rgba(255, 255, 255, 0.9) !important;
            color: var(--text-primary) !important;
            font-weight: 600 !important;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: none !important;
        }
        .leaflet-control-zoom a:hover {
            background: #fff !important;
        }

        /* ----- CUSTOM MARKERS - SVG based with SMIL ----- */
        .custom-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transition: transform 0.15s ease;
            cursor: pointer;
            position: relative;
            contain: layout style paint;
            will-change: transform;
            background: var(--status-bg, #9e9e9e);
            color: #fff;
        }
        .custom-marker:hover {
            transform: scale(1.15);
        }
        .custom-marker.marker-on {
            --status-bg: var(--success);
        }
        .custom-marker.marker-off {
            --status-bg: var(--danger);
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.55);
        }
        .custom-marker.marker-warning {
            --status-bg: var(--warning);
        }
        .custom-marker.marker-unknown {
            --status-bg: #9e9e9e;
        }
        .custom-marker svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        .custom-marker .pulse-ring-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .custom-marker .pulse-ring-svg circle {
            fill: none;
            stroke: rgba(255, 107, 107, 0.4);
            stroke-width: 2;
        }

        .user-marker {
            width: 20px;
            height: 20px;
            background: var(--primary);
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.25);
            position: relative;
        }
        .user-marker::after {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 2px solid rgba(108, 99, 255, 0.35);
            animation: user-ring-pulse 2s infinite;
            will-change: transform, opacity;
            contain: strict;
            pointer-events: none;
        }
        @keyframes user-ring-pulse {
            0% {
                transform: scale(0.6);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        .popup-zone {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .popup-zone .name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
        }
        .popup-zone .gov {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .popup-zone .status-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 4px 0;
        }
        .popup-zone .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 12px 2px 8px;
            border-radius: var(--radius-full);
            width: fit-content;
        }
        .popup-zone .status-badge.on {
            background: rgba(76, 175, 80, 0.15);
            color: var(--success-dark);
        }
        .popup-zone .status-badge.off {
            background: rgba(255, 107, 107, 0.15);
            color: var(--danger-dark);
        }
        .popup-zone .status-badge.warning {
            background: rgba(255, 193, 7, 0.15);
            color: var(--warning-dark);
        }
        .popup-zone .status-badge.unknown {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-muted);
        }
        .popup-zone .status-badge svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
        .popup-zone .counts {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
        }
        .popup-zone .counts span .off {
            color: var(--danger);
            font-weight: 600;
        }
        .popup-zone .counts span .on {
            color: var(--success);
            font-weight: 600;
        }
        .popup-zone .time {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .popup-zone .time svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
            vertical-align: middle;
        }
        .popup-zone .report-btn {
            margin-top: 8px;
            padding: 6px 14px;
            border: none;
            border-radius: var(--radius-full);
            background: var(--danger);
            color: #fff;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
            width: fit-content;
            pointer-events: auto;
            touch-action: manipulation;
            will-change: transform;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .popup-zone .report-btn:hover {
            background: var(--danger-dark);
            transform: scale(1.04);
        }
        .popup-zone .report-btn:active {
            transform: scale(0.94);
        }
        .popup-zone .report-btn.report-on {
            background: var(--success);
        }
        .popup-zone .report-btn.report-on:hover {
            background: var(--success-dark);
        }
        .popup-zone .report-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* ----- BOTTOM SHEET - GPU-accelerated ----- */
        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 15;
            max-height: 55vh;
            background: var(--bg-glass);
            backdrop-filter: blur(var(--blur-strength)) saturate(1.4);
            -webkit-backdrop-filter: blur(var(--blur-strength)) saturate(1.4);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            box-shadow: 0 -12px 48px rgba(0, 0, 0, 0.10);
            transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translateY(calc(100% - var(--sheet-handle-height)));
            overflow: hidden;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            will-change: transform;
            contain: layout style paint;
        }
        .bottom-sheet.open {
            transform: translateY(0);
        }
        .bottom-sheet .sheet-handle {
            display: flex;
            justify-content: center;
            padding: 10px 0 4px;
            cursor: pointer;
            flex-shrink: 0;
            height: var(--sheet-handle-height);
            align-items: center;
            touch-action: manipulation;
            contain: layout style paint;
        }
        .bottom-sheet .sheet-handle .bar {
            width: 48px;
            height: 5px;
            background: rgba(0, 0, 0, 0.18);
            border-radius: 20px;
            transition: background 0.2s ease;
        }
        .bottom-sheet .sheet-handle:hover .bar {
            background: rgba(0, 0, 0, 0.30);
        }
        .sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px 8px;
            flex-shrink: 0;
            contain: layout style paint;
        }
        .sheet-header h3 {
            font-size: 0.95rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sheet-header h3 svg {
            width: 18px;
            height: 18px;
            fill: var(--primary);
        }
        .sheet-header h3 .count {
            font-weight: 400;
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.05);
            padding: 0 10px;
            border-radius: var(--radius-full);
        }
        .sheet-header .sheet-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .sheet-header .sheet-actions button {
            border: none;
            background: rgba(0, 0, 0, 0.04);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
            touch-action: manipulation;
            will-change: transform;
        }
        .sheet-header .sheet-actions button.active {
            background: var(--primary);
            color: #fff;
        }
        .sheet-header .sheet-actions button:hover {
            background: rgba(0, 0, 0, 0.08);
        }
        .sheet-header .sheet-actions button.active:hover {
            background: var(--primary-dark);
        }

        .sheet-body {
            padding: 0 12px 12px;
            overflow-y: auto;
            max-height: calc(55vh - 100px);
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            overscroll-behavior: contain;
            contain: layout style paint;
        }
        .sheet-body .zone-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
            cursor: pointer;
            contain: layout style paint;
            touch-action: manipulation;
            will-change: transform;
        }
        .sheet-body .zone-item:active {
            transform: scale(0.98);
        }
        .sheet-body .zone-item .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.6);
            will-change: transform;
        }
        .sheet-body .zone-item .dot.on {
            background: var(--success);
        }
        .sheet-body .zone-item .dot.off {
            background: var(--danger);
            box-shadow: 0 0 12px rgba(255, 107, 107, 0.3);
        }
        .sheet-body .zone-item .dot.warning {
            background: var(--warning);
        }
        .sheet-body .zone-item .dot.unknown {
            background: #b0b0b0;
        }
        .sheet-body .zone-item .info {
            flex: 1;
            min-width: 0;
        }
        .sheet-body .zone-item .info .zname {
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sheet-body .zone-item .info .zgov {
            font-size: 0.65rem;
            color: var(--text-muted);
        }
        .sheet-body .zone-item .info .zmeta {
            font-size: 0.65rem;
            color: var(--text-muted);
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 1px;
            flex-wrap: wrap;
        }
        .sheet-body .zone-item .info .zmeta .status-badge {
            font-weight: 600;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 0 10px;
            border-radius: var(--radius-full);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .sheet-body .zone-item .info .zmeta .status-badge svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }
        .sheet-body .zone-item .info .zmeta .status-badge.on {
            background: rgba(76, 175, 80, 0.15);
            color: var(--success-dark);
        }
        .sheet-body .zone-item .info .zmeta .status-badge.off {
            background: rgba(255, 107, 107, 0.15);
            color: var(--danger-dark);
        }
        .sheet-body .zone-item .info .zmeta .status-badge.warning {
            background: rgba(255, 193, 7, 0.15);
            color: var(--warning-dark);
        }
        .sheet-body .zone-item .info .zmeta .status-badge.unknown {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-muted);
        }
        .sheet-body .zone-item .info .zmeta .counts {
            display: flex;
            gap: 8px;
        }
        .sheet-body .zone-item .info .zmeta .counts .off {
            color: var(--danger);
        }
        .sheet-body .zone-item .info .zmeta .counts .on {
            color: var(--success);
        }
        .sheet-body .zone-item .action-group {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .sheet-body .zone-item .action-group button {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: var(--radius-full);
            background: rgba(255, 107, 107, 0.10);
            color: var(--danger);
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            touch-action: manipulation;
            will-change: transform;
        }
        .sheet-body .zone-item .action-group button svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        .sheet-body .zone-item .action-group button:hover {
            background: rgba(255, 107, 107, 0.20);
            transform: scale(1.08);
        }
        .sheet-body .zone-item .action-group button:active {
            transform: scale(0.88);
        }
        .sheet-body .zone-item .action-group button.btn-on {
            background: rgba(76, 175, 80, 0.10);
            color: var(--success);
        }
        .sheet-body .zone-item .action-group button.btn-on:hover {
            background: rgba(76, 175, 80, 0.20);
        }

        .sheet-body .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .sheet-body .empty-state svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
            opacity: 0.4;
            margin-bottom: 12px;
        }
        .sheet-body .empty-state p {
            font-size: 0.85rem;
        }

        /* ----- FLOATING REPORT BUTTON ----- */
        .fab-report {
            position: absolute;
            bottom: 80px;
            right: 16px;
            z-index: 12;
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--danger), var(--danger-dark));
            color: #fff;
            font-size: 1.5rem;
            box-shadow: 0 8px 32px rgba(255, 107, 107, 0.45);
            cursor: pointer;
            transition: opacity 0.25s ease, transform 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            touch-action: manipulation;
            will-change: transform, opacity;
            contain: layout style paint;
            z-index: 1000;
        }
        .fab-report.sheet-is-open {
            opacity: 0;
            pointer-events: none;

            transform: translateY(-2px);

        .toast-container {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
            max-width: 90vw;
            will-change: transform;

            padding: 12px 24px;

            background: rgba(26, 26, 46, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            font-weight: 500;
            font-size: 0.85rem;

            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            will-change: transform, opacity;

            height: 18px;
            fill: currentColor;
            flex-shrink: 0;

            background: rgba(30, 30, 80, 0.92);

                transform: translateY(30px) scale(0.9);

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

        .toast.out {
            animation: toast-out 0.3s ease forwards;

        @keyframes toast-out {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
            }

        .loading-overlay {

            color: var(--text-secondary);

            }
            .toast-container {

            }
        }

        @media (min-width: 768px) {

                max-height: 45vh;
            }

        @supports (padding: max(0px)) {

            .toast-container {

        }

        .hidden {
            display: none !important;
        }
        .text-truncate {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;

        /* Perf: reduced-motion cuts all animations */
        @media (prefers-reduced-motion: reduce) {

            'Kébili': { lat: 33.7044, lng: 8.9690 },
        };

        // ============================================================
        //  STATE
        // ============================================================
        let zones = [];
        let map = null;
        const markers = new Map(); // id -> { marker, iconContainer, popupContent }
        let userMarker = null;
        let userLocation = null;
        let selectedStatus = 'off';
        let currentFilter = 'all';
        let isSheetOpen = false;
        let pollTimer = null;
        let isRefreshing = false;
        const zoneHashes = new Map(); // id -> hash string
        const statusCache = new Map();

        // ============================================================
        //  DOM REFS
        // ============================================================
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        const mapEl = $('#map');
        const loadingEl = $('#loadingOverlay');
        const loadingText = $('#loadingText');
        const sheetEl = $('#bottomSheet');
        const sheetHandle = $('#sheetHandle');
        const sheetBody = $('#sheetBody');
        const zoneCount = $('#zoneCount');
        const fabReport = $('#fabReport');
        const refreshBtn = $('#refreshBtn');
        const locateBtn = $('#locateBtn');
        const statsBtn = $('#statsBtn');
        const reportModal = $('#reportModal');
        const modalClose = $('#modalClose');
        const zoneSelect = $('#zoneSelect');
        const statusOpts = $$('#statusOptions .opt');
        const submitBtn = $('#submitReport');
        const toastContainer = $('#toastContainer');

        // ============================================================
        //  TOAST
        // ============================================================
        function showToast(message, type = 'info', duration = 3500) {
            const icons = {
                success: 'circle-check',
                error: 'circle-exclamation',
                info: 'circle-info',
            };
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.innerHTML = `<svg><use href="#icon-${icons[type] || 'circle-info'}"/></svg> ${message}`;
            toastContainer.appendChild(el);
            const remove = () => {
                el.classList.add('out');
                setTimeout(() => { if (el.parentNode) el.remove(); }, 350);
            };
            setTimeout(remove, duration);
            while (toastContainer.children.length > 3) {
                const first = toastContainer.firstChild;
                if (first) {
                    first.classList.add('out');
                    setTimeout(() => { if (first.parentNode) first.remove(); }, 350);
                }
            }
        }

        // ============================================================
        //  API (with fetchpriority hint via headers? Not standard; we'll use early call)
        // ============================================================
        async function fetchZones() {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 10000);
            try {
                const resp = await fetch(API_URL, {
                    headers: {
                        'apikey': API_KEY,
                        'Authorization': `Bearer ${API_KEY}`,
                        'Accept': 'application/json',
                    },
                    signal: controller.signal,
                    cache: 'no-cache',
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                return data.map((item) => ({
                    id: item.slug || item.id || crypto.randomUUID(),
                    name: item.name || item.zone_name || 'Unknown',
                    gov: item.gov || '',
                    off_count: parseInt(item.off_count) || 0,
                    on_count: parseInt(item.on_count) || 0,
                    last_report: item.last_report || item.updated_at || new Date().toISOString(),
                    raw: item,
                }));
            } catch (err) {
                if (err.name === 'AbortError') {
                    console.warn('Fetch timed out');
                } else {
                    console.warn('Fetch error:', err);
                }
                return null;
            } finally {
                clearTimeout(timeout);
            }
        }

        // ============================================================
        //  COORDINATE HELPERS
        // ============================================================
        function getGovCoords(gov) {
            if (!gov) return null;
            const key = Object.keys(GOV_COORDS).find(k => k.toLowerCase() === gov.toLowerCase());
            if (key) return GOV_COORDS[key];
            const firstWord = gov.split(/\s/)[0];
            const key2 = Object.keys(GOV_COORDS).find(k => k.toLowerCase().includes(firstWord.toLowerCase()));
            if (key2) return GOV_COORDS[key2];
            return null;
        }

        // Heavy processing: will yield to main thread
        function assignCoordinates(zone) {
            const coords = getGovCoords(zone.gov);
            if (coords) {
                const latOffset = (Math.random() - 0.5) * 0.2;
                const lngOffset = (Math.random() - 0.5) * 0.2;
                return { ...zone, lat: coords.lat + latOffset, lng: coords.lng + lngOffset };
            } else {
                return { ...zone, lat: 34.0 + (Math.random() - 0.5) * 4, lng: 9.0 + (Math.random() - 0.5) * 4 };
            }
        }

        // ============================================================
        //  STATUS HELPERS
        // ============================================================
        function getStatus(zone) {
            const id = zone.id;
            if (statusCache.has(id)) return statusCache.get(id);
            const off = zone.off_count || 0;
            const on = zone.on_count || 0;
            let status;
            if (off > on) status = 'off';
            else if (on > off) status = 'on';
            else if (off === 0 && on === 0) status = 'unknown';
            else status = 'warning';
            statusCache.set(id, status);
            return status;
        }

        function getStatusLabel(status) {
            const map = { off: 'Blackout', on: 'Power On', warning: 'Warning', unknown: 'Unknown' };
            return map[status] || status;
        }

        function zoneHash(zone) {
            return `${zone.off_count}|${zone.on_count}|${zone.last_report}`;
        }

        function invalidateStatusCache() {
            statusCache.clear();
        }

        // ============================================================
        //  MAP
        // ============================================================
        function initMap() {
            map = L.map(mapEl, {
                zoomControl: false,
                attributionControl: false,
                preferCanvas: true, // Leaflet tuning: use canvas for vectors (popups etc)
                fadeAnimation: false, // reduce paint storms
                zoomAnimation: true,
                markerZoomAnimation: false, // avoid re-rendering markers on zoom
            }).setView([34.0, 9.0], 7);

            L.tileLayer(MAP_TILE, {
                attribution: MAP_ATTRIB,
                maxZoom: 19,
                minZoom: 3,
                updateWhenZooming: false,
                updateWhenIdle: true,
                keepBuffer: 4,
                fadeAnimation: false,
            }).addTo(map);

            L.control.zoom({ position: 'topright' }).addTo(map);
            map.dragging.enable();
            requestAnimationFrame(() => map.invalidateSize());
        }

        // ----- Marker icon generation with SMIL pulse -----
        function buildMarkerSVG(status) {
            const iconId = status === 'off' ? 'bolt' :
                status === 'on' ? 'sun' :
                status === 'warning' ? 'exclamation-triangle' : 'circle-question';
            const pulse = status === 'off' ? `
                <svg class="pulse-ring-svg" viewBox="0 0 40 40">
                    <circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,107,107,0.4)" stroke-width="2">
                        <animateTransform attributeName="transform" type="scale" values="1;1.8" dur="2s" repeatCount="indefinite" additive="sum"/>
                        <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/>
                    </circle>
                </svg>
            ` : '';

            return `
                <svg viewBox="0 0 40 40" width="40" height="40" style="position:absolute;top:0;left:0;pointer-events:none;">
                    <circle cx="20" cy="20" r="18" fill="var(--status-bg, #9e9e9e)"/>
                    <use href="#icon-${iconId}" x="8" y="8" width="24" height="24" fill="white"/>
                    ${pulse}
                </svg>
            `;
        }

        function createMarkerIcon(status) {
            const container = document.createElement('div');
            container.className = `custom-marker marker-${status}`;
            container.innerHTML = buildMarkerSVG(status);
            return L.divIcon({
                html: container.outerHTML,
                className: '',
                iconSize: [40, 40],
                iconAnchor: [20, 20],
                popupAnchor: [0, -24],
            });
        }

        // Mutate an existing marker's icon in-place (no setIcon)
        function mutateMarkerIcon(markerData, status) {
            const container = markerData.iconContainer;
            if (!container) return;
            // Update class
            container.className = `custom-marker marker-${status}`;
            // Update inner SVG
            container.innerHTML = buildMarkerSVG(status);
        }

        // Build popup content (returns HTML string)
        function buildPopupHTML(zone) {
            const status = getStatus(zone);
            const label = getStatusLabel(status);
            const timeStr = zone.last_report ? new Date(zone.last_report).toLocaleString() : 'Unknown';
            const iconId = status === 'off' ? 'bolt' :
                status === 'on' ? 'sun' :
                status === 'warning' ? 'exclamation-triangle' : 'circle-question';
            return `
            <div class="popup-zone" data-zone-id="${zone.id}">
              <div class="name">${zone.name}</div>
              <div class="gov">${zone.gov}</div>
              <div class="status-row">
                <span class="status-badge ${status}">
                  <svg><use href="#icon-${iconId}"/></svg>
                  ${label}
                </span>
              </div>
              <div class="counts">
                <span><span class="off">⬇ ${zone.off_count}</span> off</span>
                <span><span class="on">⬆ ${zone.on_count}</span> on</span>
              </div>
              <div class="time"><svg><use href="#icon-clock"/></svg> ${timeStr}</div>
              <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;">
                <button class="report-btn" data-id="${zone.id}" data-status="off">
                  <svg><use href="#icon-bolt"/></svg> Report Off
                </button>
                <button class="report-btn report-on" data-id="${zone.id}" data-status="on">
                  <svg><use href="#icon-sun"/></svg> Report On
                </button>
              </div>
            </div>
          `;
        }

        // ============================================================
        //  MARKER UPDATE - mutation only
        // ============================================================
        function updateMarkers(newZones) {
            const newIds = new Set(newZones.map(z => z.id));

            // Remove markers that no longer exist
            for (const [id, data] of markers) {
                if (!newIds.has(id)) {
                    map.removeLayer(data.marker);
                    markers.delete(id);
                }
            }

            for (const zone of newZones) {
                if (!zone.lat || !zone.lng || isNaN(zone.lat) || isNaN(zone.lng)) continue;
                const status = getStatus(zone);
                const hash = zoneHash(zone);

                let markerData = markers.get(zone.id);
                if (markerData) {
                    // Update status if changed (mutate icon)
                    if (markerData._status !== status) {
                        mutateMarkerIcon(markerData, status);
                        markerData._status = status;
                    }
                    // Update popup content if changed (mutate in-place)
                    if (markerData._popupHash !== hash) {
                        const popupContent = markerData.popupContent;
                        if (popupContent) {
                            popupContent.innerHTML = buildPopupHTML(zone);
                        }
                        markerData._popupHash = hash;
                    }
                    // Update position if changed
                    const pos = markerData.marker.getLatLng();
                    if (Math.abs(pos.lat - zone.lat) > 0.0001 || Math.abs(pos.lng - zone.lng) > 0.0001) {
                        markerData.marker.setLatLng([zone.lat, zone.lng]);
                    }
                } else {
                    // Create new marker
                    const icon = createMarkerIcon(status);
                    const marker = L.marker([zone.lat, zone.lng], { icon })
                        .addTo(map)
                        .bindPopup(buildPopupHTML(zone), { maxWidth: 300 });

                    // Store references for mutation
                    const iconElement = marker._icon;
                    const popupContent = marker._popup ? marker._popup._contentNode : null;

                    const data = {
                        marker,
                        iconContainer: iconElement,
                        popupContent: popupContent,
                        _status: status,
                        _popupHash: hash,
                    };
                    markers.set(zone.id, data);

                    // Popup event: delegate button clicks
                    marker.on('popupopen', function() {
                        const content = this._popup._contentNode;
                        if (!content) return;
                        // Use event delegation on content
                        if (!content._listenerAttached) {
                            content.addEventListener('click', function(e) {
                                const btn = e.target.closest('.report-btn');
                                if (btn) {
                                    e.stopPropagation();
                                    const id = btn.dataset.id;
                                    const status = btn.dataset.status || 'off';
                                    openReportModal(id, status);
                                }
                            });
                            content._listenerAttached = true;
                        }
                    });

                    // Close sheet on popup open
                    marker.on('popupopen', function() {
                        if (isSheetOpen) closeSheet();
                    });
                }
            }
        }

        // ============================================================
        //  SHEET UPDATE - smart DOM reconciliation (node moving)
        // ============================================================
        function updateSheet(newZones) {
            const filtered = currentFilter === 'all' ? newZones : newZones.filter(z => getStatus(z) === currentFilter);
            const count = filtered.length;
            zoneCount.textContent = count;

            if (count === 0) {
                sheetBody.innerHTML = `
              <div class="empty-state">
                <svg><use href="#icon-map-location-dot"/></svg>
                <p>No zones found${currentFilter !== 'all' ? ` with status "${currentFilter}"` : ''}</p>
              </div>
            `;
                return;
            }

            // Map existing items by id
            const existingItems = new Map();
            for (const child of sheetBody.children) {
                if (child.dataset && child.dataset.id) {
                    existingItems.set(child.dataset.id, child);
                }
            }

            const fragment = document.createDocumentFragment();
            const timeFormatter = new Intl.DateTimeFormat(undefined, {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
            });

            for (const zone of filtered) {
                const status = getStatus(zone);
                const label = getStatusLabel(status);
                const timeStr = zone.last_report ? timeFormatter.format(new Date(zone.last_report)) : 'Unknown';
                const id = zone.id;

                let item = existingItems.get(id);
                if (item) {
                    // Update existing item in-place
                    const dot = item.querySelector('.dot');
                    if (dot) dot.className = `dot ${status}`;
                    const nameEl = item.querySelector('.zname');
                    if (nameEl) nameEl.textContent = zone.name;
                    const govEl = item.querySelector('.zgov');
                    if (govEl) govEl.textContent = zone.gov;
                    const badge = item.querySelector('.status-badge');
                    if (badge) {
                        badge.className = `status-badge ${status}`;
                        const iconId = status === 'off' ? 'bolt' :
                            status === 'on' ? 'sun' :
                            status === 'warning' ? 'exclamation-triangle' : 'circle-question';
                        badge.innerHTML = `<svg><use href="#icon-${iconId}"/></svg> ${label}`;
                    }
                    const offEl = item.querySelector('.counts .off');
                    if (offEl) offEl.textContent = `⬇ ${zone.off_count}`;
                    const onEl = item.querySelector('.counts .on');
                    if (onEl) onEl.textContent = `⬆ ${zone.on_count}`;
                    const timeEl = item.querySelector('.zmeta span:last-child');
                    if (timeEl) {
                        timeEl.innerHTML = `<svg style="width:12px;height:12px;fill:currentColor;vertical-align:middle;"><use href="#icon-clock"/></svg> ${timeStr}`;
                    }
                    fragment.appendChild(item);
                    existingItems.delete(id);
                } else {
                    // Create new item
                    const div = document.createElement('div');
                    div.className = 'zone-item';
                    div.dataset.id = id;
                    const iconId = status === 'off' ? 'bolt' :
                        status === 'on' ? 'sun' :
                        status === 'warning' ? 'exclamation-triangle' : 'circle-question';
                    div.innerHTML = `
                <div class="dot ${status}"></div>
                <div class="info">
                  <div class="zname">${zone.name}</div>
                  <div class="zgov">${zone.gov}</div>
                  <div class="zmeta">
                    <span class="status-badge ${status}">
                      <svg style="width:12px;height:12px;fill:currentColor;"><use href="#icon-${iconId}"/></svg>
                      ${label}
                    </span>
                    <span class="counts">
                      <span class="off">⬇ ${zone.off_count}</span>
                      <span class="on">⬆ ${zone.on_count}</span>
                    </span>
                    <span><svg style="width:12px;height:12px;fill:currentColor;vertical-align:middle;"><use href="#icon-clock"/></svg> ${timeStr}</span>
                  </div>
                </div>
                <div class="action-group">
                  <button class="btn-off" data-id="${id}" title="Report blackout">
                    <svg><use href="#icon-bolt"/></svg>
                  </button>
                  <button class="btn-on" data-id="${id}" title="Report power on">
                    <svg><use href="#icon-sun"/></svg>
                  </button>
                </div>
              `;
                    // Use delegation on the item itself
                    div.addEventListener('click', function(e) {
                        const btn = e.target.closest('button');
                        if (btn) {
                            e.stopPropagation();
                            const id = btn.dataset.id;
                            if (!id) return;
                            if (btn.classList.contains('btn-off')) {
                                openReportModal(id, 'off');
                            } else if (btn.classList.contains('btn-on')) {
                                openReportModal(id, 'on');
                            }
                            return;
                        }
                        // Click on item: fly to zone
                        const zoneData = newZones.find(z => z.id === id);
                        if (zoneData && zoneData.lat && zoneData.lng) {
                            map.flyTo([zoneData.lat, zoneData.lng], 13, { duration: 1.2 });
                            const data = markers.get(id);
                            if (data) data.marker.openPopup();
                            if (window.innerWidth < 768) closeSheet();
                        }
                    });
                    fragment.appendChild(div);
                }
            }

            // Remove leftover items
            for (const [, item] of existingItems) {
                item.remove();
            }

            // Append fragment (which moves existing nodes, preserving listeners)
            sheetBody.appendChild(fragment);
        }

        // ============================================================
        //  MAIN REFRESH (with idle scheduling)
        // ============================================================
        async function refreshData(showLoading = false) {
            if (isRefreshing) return;
            isRefreshing = true;

            if (showLoading) {
                loadingEl.classList.remove('hidden');
                loadingText.textContent = 'Loading zones…';
            }

            const data = await fetchZones();
            if (data) {
                // Heavy processing: assignCoordinates for new zones; yield if needed
                let newZones;
                if (zones.length === 0) {
                    // Process in batches with yielding
                    const temp = [];
                    for (let i = 0; i < data.length; i++) {
                        temp.push(assignCoordinates(data[i]));
                        if (i % 5 === 0 && i > 0) {
                            await yieldToMain();
                        }
                    }
                    newZones = temp;
                } else {
                    const coordMap = new Map();
                    for (const z of zones) coordMap.set(z.id, { lat: z.lat, lng: z.lng });
                    newZones = data.map(zone => {
                        if (coordMap.has(zone.id)) {
                            const coords = coordMap.get(zone.id);
                            return { ...zone, lat: coords.lat, lng: coords.lng };
                        } else {
                            return assignCoordinates(zone);
                        }
                    });
                }

                // Diff
                let changed = false;
                const newHashes = new Map();
                for (const z of newZones) {
                    const h = zoneHash(z);
                    newHashes.set(z.id, h);
                    if (!zoneHashes.has(z.id) || zoneHashes.get(z.id) !== h) {
                        changed = true;
                    }
                }
                if (zoneHashes.size !== newHashes.size) changed = true;

                if (changed) {
                    zones = newZones;
                    zoneHashes.clear();
                    for (const [id, h] of newHashes) zoneHashes.set(id, h);
                    invalidateStatusCache();
                    for (const z of zones) getStatus(z);
                    // Update markers and sheet (these mutate in-place)
                    updateMarkers(zones);
                    updateSheet(zones);
                    populateZoneSelect();
                }

                if (showLoading) {
                    setTimeout(() => loadingEl.classList.add('hidden'), 300);
                }
                isRefreshing = false;
                return true;
            } else {
                if (showLoading) {
                    setTimeout(() => loadingEl.classList.add('hidden'), 300);
                }
                showToast('Failed to fetch data. Retrying…', 'error', 2500);
                isRefreshing = false;
                return false;
            }
        }

        // Helper to yield to main thread
        function yieldToMain() {
            return new Promise(resolve => {
                if ('scheduler' in window && 'yield' in window.scheduler) {
                    scheduler.yield().then(resolve);
                } else {
                    setTimeout(resolve, 0);
                }
            });
        }

        // ============================================================
        //  OTHER UI FUNCTIONS
        // ============================================================
        let zoneSelectOptionsCache = '';

        function populateZoneSelect() {
            const currentVal = zoneSelect.value;
            let opts = '<option value="">— Choose zone —</option>';
            for (const z of zones) {
                opts += `<option value="${z.id}">${z.name} (${z.gov})</option>`;
            }
            if (opts === zoneSelectOptionsCache) {
                if (currentVal) zoneSelect.value = currentVal;
                return;
            }
            zoneSelectOptionsCache = opts;
            zoneSelect.innerHTML = opts;
            if (currentVal) zoneSelect.value = currentVal;
        }

        function openSheet() {
            if (isSheetOpen) return;
            isSheetOpen = true;
            sheetEl.classList.add('open');
            fabReport.classList.add('sheet-is-open');
        }

        function closeSheet() {
            if (!isSheetOpen) return;
            isSheetOpen = false;
            sheetEl.classList.remove('open');
            fabReport.classList.remove('sheet-is-open');
        }

        function toggleSheet() {
            isSheetOpen ? closeSheet() : openSheet();
        }

        function openReportModal(zoneId = null, presetStatus = null) {
            let opts = '<option value="">— Choose zone —</option>';
            for (const z of zones) {
                const sel = z.id === zoneId ? 'selected' : '';
                opts += `<option value="${z.id}" ${sel}>${z.name} (${z.gov})</option>`;
            }
            zoneSelect.innerHTML = opts;
            if (zoneId) zoneSelect.value = zoneId;

            if (presetStatus && ['off', 'on', 'warning'].includes(presetStatus)) {
                selectedStatus = presetStatus;
            } else {
                selectedStatus = 'off';
            }
            updateStatusUI();
            reportModal.classList.add('open');
        }

        function closeReportModal() {
            reportModal.classList.remove('open');
        }

        function updateStatusUI() {
            statusOpts.forEach(el => {
                const val = el.dataset.value;
                el.className = 'opt';
                if (val === selectedStatus) {
                    el.classList.add(`selected-${val}`);
                }
            });
        }

        // ============================================================
        //  USER LOCATION
        // ============================================================
        let isLocating = false;

        function locateUser(animate = true) {
            if (!navigator.geolocation) {
                showToast('Geolocation not supported.', 'error');
                return;
            }
            if (isLocating) return;
            isLocating = true;
            if (animate) showToast('Locating you…', 'info', 1500);
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    isLocating = false;
                    const { latitude, longitude } = pos.coords;
                    userLocation = { lat: latitude, lng: longitude };
                    if (userMarker) {
                        map.removeLayer(userMarker);
                        userMarker = null;
                    }
                    const divIcon = L.divIcon({
                        html: '<div class="user-marker"></div>',
                        className: '',
                        iconSize: [20, 20],
                        iconAnchor: [10, 10],
                    });
                    userMarker = L.marker([latitude, longitude], { icon: divIcon, zIndexOffset: 1000 })
                        .addTo(map)
                        .bindPopup('📍 You are here');

                    const nearest = findNearestZone(latitude, longitude);

                    if (animate) {
                        map.flyTo([latitude, longitude], 12, { duration: 1.5 });
                        map.once('moveend', () => {
                            if (nearest && markers.has(nearest.id)) markers.get(nearest.id).marker.openPopup();
                        });
                    } else {
                        map.setView([latitude, longitude], 12);
                        if (nearest && markers.has(nearest.id)) markers.get(nearest.id).marker.openPopup();
                    }

                    if (nearest) {
                        showToast(`📍 Nearest: "${nearest.name}"`, 'success', 3000);
                        highlightZone(nearest.id);
                    } else {
                        showToast('📍 Location found, no zone nearby.', 'info', 2500);
                    }
                },
                (err) => {
                    isLocating = false;
                    console.warn('Geolocation error:', err);
                    if (animate) showToast('Could not get your location. Check permissions.', 'error');
                }, { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function findNearestZone(lat, lng) {
            let best = null;
            let bestDist = Infinity;
            const latRad = lat * Math.PI / 180;
            const lngRad = lng * Math.PI / 180;
            const R = 6371;
            for (const z of zones) {
                if (!z.lat || !z.lng || isNaN(z.lat) || isNaN(z.lng)) continue;
                const dLat = (z.lat - lat) * Math.PI / 180;
                const dLng = (z.lng - lng) * Math.PI / 180;
                const a = Math.sin(dLat / 2) ** 2 +
                    Math.cos(latRad) * Math.cos(z.lat * Math.PI / 180) *
                    Math.sin(dLng / 2) ** 2;
                const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                if (d < bestDist) {
                    bestDist = d;
                    best = z;
                }
            }
            return best;
        }

        function highlightZone(id) {
            const items = sheetBody.querySelectorAll('.zone-item');
            for (const item of items) {
                if (item.dataset.id === id) {
                    item.style.background = 'rgba(108,99,255,0.12)';
                    item.style.borderColor = 'var(--primary)';
                    item.scrollIntoView({ block: 'center', behavior: 'smooth' });
                    setTimeout(() => {
                        item.style.background = '';
                        item.style.borderColor = '';
                    }, 3000);
                    break;
                }
            }
        }

        // ============================================================
        //  STATS
        // ============================================================
        function showStats() {
            const total = zones.length;
            let off = 0,
                on = 0,
                warning = 0,
                unknown = 0;
            for (const z of zones) {
                const s = getStatus(z);
                if (s === 'off') off++;
                else if (s === 'on') on++;
                else if (s === 'warning') warning++;
                else unknown++;
            }
            const msg =
                `📊 <b>Zone Stats</b><br>Total: ${total} &nbsp;|&nbsp; 🔴 Off: ${off} &nbsp;|&nbsp; 🟢 On: ${on} &nbsp;|&nbsp; 🟡 Warning: ${warning} &nbsp;|&nbsp; ⚪ Unknown: ${unknown}`;
            showToast(msg, 'info', 5000);
        }

        // ============================================================
        //  REPORT SUBMISSION
        // ============================================================
        async function submitReport(zoneId, status) {
            if (!zoneId) {
                showToast('Please select a zone.', 'error');
                return false;
            }
            const zone = zones.find(z => z.id === zoneId);
            if (!zone) {
                showToast('Zone not found.', 'error');
                return false;
            }

            if (status === 'off') zone.off_count = (zone.off_count || 0) + 1;
            else if (status === 'on') zone.on_count = (zone.on_count || 0) + 1;
            else if (status === 'warning') {
                zone.off_count = (zone.off_count || 0) + 0.5;
            }
            zone.last_report = new Date().toISOString();
            invalidateStatusCache();
            for (const z of zones) getStatus(z);

            updateMarkers(zones);
            updateSheet(zones);

            try {
                const patchUrl =
                    `https://njfulpklvqezflxiozhn.supabase.co/rest/v1/zone_board?slug=eq.${encodeURIComponent(zoneId)}`;
                const payload = {
                    off_count: Math.round(zone.off_count || 0),
                    on_count: Math.round(zone.on_count || 0),
                    last_report: new Date().toISOString(),
                };
                const resp = await fetch(patchUrl, {
                    method: 'PATCH',
                    headers: {
                        'apikey': API_KEY,
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal',
                    },
                    body: JSON.stringify(payload),
                });
                if (!resp.ok) {
                    await fetch('https://njfulpklvqezflxiozhn.supabase.co/rest/v1/zone_board', {
                        method: 'POST',
                        headers: {
                            'apikey': API_KEY,
                            'Authorization': `Bearer ${API_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal',
                        },
                        body: JSON.stringify({
                            slug: zoneId,
                            name: zone.name,
                            gov: zone.gov,
                            off_count: Math.round(zone.off_count || 0),
                            on_count: Math.round(zone.on_count || 0),
                            last_report: new Date().toISOString(),
                        }),
                    });
                }
                zoneHashes.set(zoneId, zoneHash(zone));
                return true;
            } catch (err) {
                console.warn('Report persist error:', err);
                return true;
            }
        }

        // ============================================================
        //  EVENT BINDING
        // ============================================================
        function bindEvents() {
            sheetHandle.addEventListener('click', toggleSheet);

            document.querySelectorAll('.sheet-actions button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.sheet-actions button').forEach(b => b.classList.remove(
                    'active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    updateSheet(zones);
                });
            });

            fabReport.addEventListener('click', () => {
                if (zones.length === 0) {
                    showToast('No zones loaded yet.', 'error');
                    return;
                }
                if (userLocation) {
                    const nearest = findNearestZone(userLocation.lat, userLocation.lng);
                    if (nearest) {
                        openReportModal(nearest.id, 'off');
                        return;
                    }
                }
                openReportModal();
            });

            refreshBtn.addEventListener('click', () => {
                refreshBtn.querySelector('svg').classList.add('fa-spin');
                refreshData(true).finally(() => {
                    refreshBtn.querySelector('svg').classList.remove('fa-spin');
                });
            });

            locateBtn.addEventListener('click', () => locateUser(true));
            statsBtn.addEventListener('click', showStats);

            modalClose.addEventListener('click', closeReportModal);
            reportModal.addEventListener('click', (e) => {
                if (e.target === reportModal) closeReportModal();
            });

            statusOpts.forEach(el => {
                el.addEventListener('click', () => {
                    selectedStatus = el.dataset.value;
                    updateStatusUI();
                });
            });

            submitBtn.addEventListener('click', async () => {
                const zoneId = zoneSelect.value;
                if (!zoneId) {
                    showToast('Please select a zone.', 'error');
                    return;
                }
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<svg class="fa-spin"><use href="#icon-sync-alt"/></svg> Submitting…';

                const ok = await submitReport(zoneId, selectedStatus);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<svg><use href="#icon-paper-plane"/></svg> Submit Report';

                if (ok) {
                    const zone = zones.find(z => z.id === zoneId);
                    showToast(`✅ Report submitted for "${zone?.name || zoneId}" (${selectedStatus})`, 'success');
                    closeReportModal();
                } else {
                    showToast('❌ Failed to submit. Please try again.', 'error');
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeReportModal();
            });

            let resizeRaf = null;
            window.addEventListener('resize', () => {
                if (resizeRaf) cancelAnimationFrame(resizeRaf);
                resizeRaf = requestAnimationFrame(() => {
                    if (map) map.invalidateSize();
                });
            }, { passive: true });
        }

        // ============================================================
        //  POLLING
        // ============================================================
        function startPolling() {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(() => {
                if (document.visibilityState === 'visible') {
                    refreshData(false);
                }
            }, POLL_INTERVAL_MS);
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                refreshData(false);
            }
        });

        // ============================================================
        //  INIT
        // ============================================================
        async function init() {
            initMap();
            bindEvents();

            await refreshData(true);
            startPolling();

            setTimeout(() => {
                if (navigator.geolocation) locateUser(false);
            }, 1200);

            console.log('⚡ 3awed9ass – performance-optimized');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
